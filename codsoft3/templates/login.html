<!DOCTYPE html>

<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="login-box">

    <h1>AI Security System</h1>

    <form action="/login" method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">

            Login

        </button>

    </form>

    {% if error %}

    <p class="error">

        {{ error }}

    </p>

    {% endif %}

    <a href="/register">

        <button class="register-btn">

            Create Account

        </button>

    </a>

</div>

</body>

</html>
